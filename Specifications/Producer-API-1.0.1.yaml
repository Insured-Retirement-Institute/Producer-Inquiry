openapi: 3.1.0
info:
  version: 1.0.0
  title: Producer Eligibility API
  description: |
    This API provides services for determining producer eligibility to sell 
    specific financial products. It enables organizations to:
    
    - Verify eligibility for producers to sell specific products
    - Check licensing, appointments, and regulatory requirements
    - Ensure compliance with regulatory requirements
     
  contact:
    name: Insured Retirement Institute
    url: https://github.com/Insured-Retirement-Institute/Producer-Training
    email: technicalsupport@iri.org
tags:
- name: Producer Eligibility
  description: Determine eligibility for one or more producers to sell products
    based on licensing, appointments, and regulatory requirements.

security:
  - bearerAuth: []
  - basicAuth: []

paths:
  /producer/eligibilities:
    post:
      operationId: checkProducerEligibilities
      summary: Determine eligibility for one or more producers to sell products 
      description: |
        Evaluates whether one or more producers are eligible to sell a specific
        financial product in a given jurisdiction. The system checks licensing, appointments,
        training requirements, and regulatory compliance to return an eligibility decision.
      parameters:
      - $ref: '#/components/parameters/transaction_id_header'
      tags:
      - Producer Eligibility
      requestBody:
        $ref: '#/components/requestBodies/ProducerEligibilityRequest'
      responses:
        '200':
          $ref: '#/components/responses/producerEligibilityResponse'
        '400':
          $ref: '#/components/responses/400StandardMessageResponse'
        '401':
          $ref: '#/components/responses/401StandardMessageResponse'
        '403':
          $ref: '#/components/responses/403StandardMessageResponse'
        '500':
          $ref: '#/components/responses/500StandardMessageResponse'
        default:
          $ref: '#/components/responses/DefaultStandardMessageResponse'
      security:
      - bearerAuth: []
      - basicAuth: []
components:
  parameters:
    # Common header parameters
    transaction_id_header:
      name: X-Request-ID
      in: header
      required: false
      description: A unique identifier for each transaction. Matches trackingNumber
        in request transaction information element.
      schema:
        type: string
      example: 451424606200000000001
  securitySchemes:
    bearerAuth:
      type: http
      description: A bearer token in the format of a JWS and conforms to the specifications
        included in RFC8725
      scheme: bearer
      bearerFormat: JWT
    basicAuth:
      type: http
      scheme: basic
  requestBodies:
    ProducerEligibilityRequest:
      description: Parameters passed as part of the request body.
      required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProducerEligibilityRequest'
  responses:
    producerEligibilityResponse:
      description: 200 response payload.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProducerEligibilityResponse'
    400StandardMessageResponse:
      description: Input validation errored with StandardMessage containing error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardMessage'
    401StandardMessageResponse:
      description: Proper user authentication credentials were not provided
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardMessage'
    403StandardMessageResponse:
      description: The user is not authorized to make this request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardMessage'
    500StandardMessageResponse:
      description: There was a problem with either the network or the server. Please
        see the included message for more details.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardMessage'
    DefaultStandardMessageResponse:
      description: There was a problem. Please see the included message for more details.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/StandardMessage'
  schemas:    
    ProducerEligibilityRequest:
      type: object
      description: Request payload for checking producer eligibility
      properties:
        cusip:
          type: string
          description: Product CUSIP
        policyNumber:
          type: string
          description: The unique number assigned to the policy, or submission,
            being referenced.
          minLength: 1
          maxLength: 30
          pattern: (^[0-9A-Za-z*@#\s.,'_/~%$!();:&amp;&quot;+&#x00ae;`\-\\?"=]{1,30}$)
        signedDate:
          type: string
          format: date
          description: Date of Initiation or Submission. CCYY-MM-DD format.
        transactionInformation:
          $ref: '#/components/schemas/transactionInformation'
        applicationSigned:
          type: object
          description: Placeholder for applicationSigned details. Define properties
            as needed.
        solicitation:
          $ref: '#/components/schemas/solicitation'
        ProducerList:
          type: array
          description: List of Producers to evaluate for eligibility.
          items:
            $ref: '#/components/schemas/producer'
          minItems: 1
          maxItems: 25
      required:
      - transactionInformation
      - cusip
      - ProducerList

    ProducerEligibilityResponse:
      type: object
      description: Response payload for producer eligibility results
      properties:
        transactionInformation:
          $ref: '#/components/schemas/transactionInformation'
        eligibilityResults:
          type: array
          items:
            $ref: '#/components/schemas/eligibilityResponseList'
          minItems: 1
          maxItems: 25
      required:
      - transactionInformation
      - eligibilityResults
    
    EligibilityStatusEnum:
      type: string
      enum:
        - 'APPROVED'
        - 'CONDITIONAL'
        - 'DENIED'
      description: Eligibility decision result

    IneligibilityReasonEnum:
      type: string
      enum:
        - 'INVALID_LICENSE'
        - 'EXPIRED_APPOINTMENT'
        - 'MISSING_TRAINING'
        - 'INVALID_PRODUCT'
        - 'JURISDICTION_RESTRICTION'
        - 'COMPLIANCE_VIOLATION'
        - 'PENDING_REVIEW'
        - 'SYSTEM_ERROR'
      description: Specific reasons why producer eligibility was denied or conditional
    StandardMessage:
      type: object
      required:
      - developerMessage
      properties:
        userMessage:
          type: string
          description: User-friendly message for the Warning/Error.
        developerMessage:
          type: string
          description: Developer information on the Warning/Error.
        MessageId:
          type: string
          description: NW Message ID provided in the header and used in the API log.
            This id should be included in any user messaging to assist in troubleshooting.
        code:
          type: string
          description: Code generated by the API to identify the specific error.
        source:
          type: string
          description: The field or resource which triggered the message.
        docs:
          type: string
          description: The URL to documentation that will provide more information.
    transactionInformation:
      type: object
      description: The Transaction Information Resource is designed to provide all the
        information about a transaction request.
      properties:
        associatedFirmId:
          type: string
          description: This is to identify the associate Firm ID of this particular
            transaction.
          minLength: 1
          maxLength: 65
        effectiveDate:
          type: string
          description: The date on which this transaction takes effect. CCYY-MM-DD
            format.
          format: date
        receiver:
          type: string
          description: This is to identify the recivever of this particular transaction.
          minLength: 8
          maxLength: 8
          pattern: (^[0-9]{1,9}$)(?<!^0+$)
        sender:
          type: string
          description: This is to identify the sender of this particular transaction.
          minLength: 8
          maxLength: 8
          pattern: (^[0-9]{1,9}$)(?<!^0+$)
        trackingNumber:
          type: string
          description: This is an alphanumeric value used to identify a specific transaction.
          minLength: 1
          maxLength: 65
      additionalProperties: false
      required:
      - effectiveDate
      - receiver
      - sender
      - trackingNumber
    partyIdentity:
      type: object
      description: This object will contain information regarding identification associated
        to a specific Producer.
      properties:
        typeCode:
          type: string
          description: A code identifying individual type of unique identifier.
          enum:
          - CRD
          - NPN
          - SSN
        typeId:
          type: string
          description: This is the unique Identifier for the Producer
            with whom partyIdentity is associated.
          minLength: 5
          maxLength: 10
    addressBase:
      type: object
      description: This object is a subset of address and is used when the address
        information is inherited into other objects. This identifies the state, province
        or national subdivision. The specific values depend upon the national  jurisdiction
        and will be code value.
      properties:
        stateOrProvinceCode:
          type: string
          description: This identifies the state, province or national subdivision.
            The specific values depend upon the national jurisdiction and will be
            code value.
          x-codeList: stateOrProvinceCode
      additionalProperties: false
      required:
      - stateOrProvinceCode
    producer:
      type: object
      description: Information about a producer including identification,
        name details, and role information.
      properties:
        sequenceNumber:
          type: number
          description: Sequential identifier for this professional in the request list.
          minimum: 1
          maximum: 25
        fullName:
          type: string
          description: Complete name of the producer
          maxLength: 250
        givenName:
          type: string
          description: First name of the producer
          minLength: 1
          maxLength: 105
        surname:
          type: string
          description: Last name or family name of the producer
          minLength: 1
          maxLength: 105
        partyIdentity:
          type: array
          description: List of identification numbers for the producer
          items:
            $ref: '#/components/schemas/partyIdentity'
          minItems: 1
          maxItems: 3
      required:
      - sequenceNumber
      - givenName
      - surname
      - partyIdentity
    eligibilityResponseList:
      type: array
      items:
        $ref: '#/components/schemas/eligibilityResponseItem'
      description: List of eligibility decisions for the requested producers.
    eligibilityResponseItem:
      type: object
      description: Eligibility decision result for a specific producer
      properties:
        sequenceNumber:
          type: number
          description: Sequential identifier matching the request
          minimum: 1
          maximum: 25
        givenName:
          type: string
          description: First name of the producer
          minLength: 1
          maxLength: 105
        surname:
          type: string
          description: Last name of the producer
          minLength: 1
          maxLength: 105
        statusCode:
          $ref: '#/components/schemas/EligibilityStatusEnum'
        statusMessage:
          type: string
          description: Human-readable explanation of the eligibility decision
          maxLength: 500
        ineligibilityReason:
          $ref: '#/components/schemas/IneligibilityReasonEnum'
          description: Specific reason why eligibility was denied or conditional (only present when statusCode is DENIED or CONDITIONAL)
      required:
      - sequenceNumber
      - statusCode
    solicitation:
      allOf:
      - $ref: '#/components/schemas/addressBase'
